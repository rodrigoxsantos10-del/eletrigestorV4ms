function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2800);return()=>clearTimeout(t)},[]);
  return(
    <div className={`fixed bottom-6 right-6 z-50 flex items-center gap-2 px-5 py-3 rounded-xl font-semibold text-sm shadow-2xl fade-in ${type==='ok'?'bg-green-900 border border-green-500 text-green-400':'bg-red-900 border border-red-500 text-red-400'}`}>
      {type==='ok'?'✓':'✗'} {msg}

  );
}

function Badge({children,color='yellow'}){

    </div>
  );
}

function SvgBarChart({months,series}){
  const W=580,H=150,PL=42,PB=22,PT=14,PR=8;
  const aH=H-PT-PB,aW=W-PL-PR;
  const gW=aH>0&&months.length>0?aW/months.length:1;
  const allV=series.flatMap(s=>s.data);const maxV=Math.max(...allV,1);
  const bW=Math.min(gW*0.28,22);
  const colors=['#FFD600','#22c55e','#f97316'];
  const labels=['Fat.','Lucro Liq.','Imposto'];
  const yScale=v=>PT+aH*(1-v/maxV);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block',borderRadius:8,background:'#111'}}>
      {[0,.25,.5,.75,1].map(p=>(
        <g key={p}>
          <line x1={PL} y1={PT+aH*(1-p)} x2={W-PR} y2={PT+aH*(1-p)} stroke="#1e1e1e" strokeWidth="0.5"/>
          {p>0&&<text x={PL-4} y={PT+aH*(1-p)+3} fontSize="8" fill="#444" textAnchor="end" fontFamily="monospace">R${Math.round(maxV*p/1000)}k</text>}
        </g>
      ))}
      {months.map((m,i)=>{
        const cx=PL+i*gW+gW/2;
        return(
          <g key={i}>
            {series.map((s,si)=>{
              const v=s.data[i]||0;if(!v)return null;
              const bh=Math.max(aH*(v/maxV),2);
              const totalBW=bW*series.length+(series.length-1)*3;
              const x=cx-totalBW/2+si*(bW+3);
              return <rect key={si} x={x.toFixed(1)} y={(PT+aH-bh).toFixed(1)} width={bW} height={bh.toFixed(1)} fill={colors[si]} rx="3" opacity=".9"/>;
            })}
            <text x={cx} y={H-4} fontSize="8" fill="#555" textAnchor="middle" fontFamily="system-ui">{m}</text>
          </g>
        );
      })}
      {labels.map((l,i)=><text key={i} x={PL+i*75} y="11" fontSize="8" fill={colors[i]} fontFamily="system-ui">■ {l}</text>)}
    </svg>
  );
}

function Dashboard({svcs,desp,acomps}){
  const tot=svcs.reduce((a,s)=>a+s.valor,0);
  const totL=svcs.reduce((a,s)=>a+lucroSvc(s),0);
  const totI=svcs.reduce((a,s)=>a+impostoSvc(s),0);
  const totD=desp.reduce((a,d)=>a+d.valor,0);
  const totLiq=svcs.reduce((a,s)=>a+lucroLiqSvc(s),0)-totD;
  const pend=svcs.filter(s=>s.status==='Pendente').reduce((a,s)=>a+s.valor,0);
  const ticket=svcs.length?tot/svcs.length:0;
  const pctMeta=clamp(tot/META*100,0,100);
  const fatR=svcs.filter(s=>s.segmento==='Residencial').reduce((a,s)=>a+s.valor,0);
  const fatI=svcs.filter(s=>s.segmento==='Industrial').reduce((a,s)=>a+s.valor,0);
  const emAnd=acomps.filter(a=>a.status==='Em Andamento').length;

  const byM={};
  svcs.forEach(s=>{
    const d=new Date(s.data+'T12:00:00');
    const k=`${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
    if(!byM[k])byM[k]={fat:0,luc:0,imp:0,mes:MESES_S[d.getMonth()]};
    byM[k].fat+=s.valor;byM[k].luc+=lucroLiqSvc(s);byM[k].imp+=impostoSvc(s);
  });
  desp.forEach(d=>{
    const dt=new Date(d.data+'T12:00:00');
    const k=`${dt.getFullYear()}-${String(dt.getMonth()).padStart(2,'0')}`;
    if(byM[k])byM[k].luc-=d.valor;
  });
  const months=Object.entries(byM).sort(([a],[b])=>a.localeCompare(b)).slice(-6).map(([,v])=>v);
  const recent=[...svcs].sort((a,b)=>new Date(b.data)-new Date(a.data)).slice(0,6);

  return(
    <div className="fade-in space-y-4">
      <div className="grid gap-3" style={{gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))"}}>
        <KPI label="Faturamento" value={brl(tot)} sub={`${svcs.length} serviços`}/>
        <KPI label="Lucro Bruto" value={brl(totL)} sub={`Margem ${tot>0?(totL/tot*100).toFixed(1):0}%`} color="#22c55e"/>
        <KPI label="Despesas" value={brl(totD)} sub={`${desp.length} lançamentos`} color="#f97316"/>
        <KPI label="Lucro Líquido Real" value={brl(totLiq)} sub="Após impostos e desp." color="#60a5fa"/>
        <KPI label="A Receber" value={brl(pend)} sub="Pendente" color="#f87171"/>
      </div>

      <div className="grid gap-4" style={{gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))"}}>
        <div className="col-span-2 rounded-xl p-4" style={{background:'#161616',border:'1px solid #2a2a2a'}}>
          <div className="flex justify-between items-center mb-2">
            <span className="text-sm font-semibold">Meta Mensal — {brl(META)}</span>
            <span className="mono font-bold text-sm" style={{color:pctMeta>=100?'#22c55e':'#FFD600'}}>{pctMeta.toFixed(0)}% atingida</span>
          </div>
          <ProgressBar pct={pctMeta} color={pctMeta>=100?'#22c55e':'#FFD600'}/>
          <p className="text-xs mt-2" style={{color:'#444'}}>{tot>=META?`🎉 Meta batida! +${brl(tot-META)} acima`:`Faltam ${brl(META-tot)} para a meta`}</p>
        </div>
        <div className="rounded-xl p-4 space-y-2" style={{background:'#161616',border:'1px solid #2a2a2a'}}>
          {[['Residencial 🏠',brl(fatR),'#FFD600'],['Industrial 🏭',brl(fatI),'#60a5fa'],['Ticket médio',brl(ticket),'#f0f0f0'],['Em andamento',emAnd+' svc','#f97316'],['Imposto total',brl(totI),'#f97316']].map(([l,v,c])=>(
            <div key={l} className="flex justify-between text-sm">
              <span style={{color:'#888'}}>{l}</span><span className="mono font-bold" style={{color:c}}>{v}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="rounded-xl p-4" style={{background:'#161616',border:'1px solid #2a2a2a'}}>
        <Sec>Faturamento, Lucro Líquido e Impostos</Sec>
        <SvgBarChart months={months.map(m=>m.mes)} series={[{data:months.map(m=>m.fat)},{data:months.map(m=>m.luc)},{data:months.map(m=>m.imp)}]}/>
      </div>

      <div className="rounded-xl overflow-hidden" style={{background:'#161616',border:'1px solid #2a2a2a'}}>
        <div className="px-4 pt-4 pb-2"><Sec>Últimos Serviços</Sec></div>
        <div className="overflow-x-auto">
          <table className="w-full">
            <thead><tr>{['Data','Cliente','Tipo','Valor','Imposto','Lucro Liq.','Status'].map(h=><th key={h} className="px-3 py-2 text-left text-xs font-bold uppercase tracking-wider" style={{color:'#555',background:'#1a1a1a',borderBottom:'1px solid #222'}}>{h}</th>)}</tr></thead>
            <tbody>{recent.map(s=>(
              <tr key={s.id} style={{borderBottom:'1px solid #161616'}} className="hover:bg-gray-900">
                <td className="px-3 py-2 text-xs" style={{color:'#666'}}>{fmtDate(s.data)}</td>
                <td className="px-3 py-2"><div className="flex items-center gap-2"><Avatar nome={s.cliente} size={24}/><span className="text-sm font-medium">{s.cliente}</span></div></td>
                <td className="px-3 py-2 text-xs" style={{color:'#666',maxWidth:120}}>{s.tipo}</td>
                <td className="px-3 py-2 mono font-bold text-sm">{brl(s.valor)}</td>
                <td className="px-3 py-2 mono text-xs" style={{color:'#f97316'}}>{brl(impostoSvc(s))}</td>
                <td className="px-3 py-2 mono font-bold text-sm" style={{color:lucroLiqSvc(s)>=0?'#22c55e':'#f87171'}}>{brl(lucroLiqSvc(s))}</td>
                <td className="px-3 py-2"><Badge color={s.status==='Recebido'?'green':'red'}>{s.status}</Badge></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function Lancar({clientes,onAdd}){
  const [f,setF]=useState({data:today(),cliente:'',segmento:'Residencial',tipo:TIPOS[0],status:'Recebido',valor:'',material:'',horas:'',km:'',visita:false});
  const [toast,setToast]=useState(null);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const val=parseFloat(f.valor)||0,mat=parseFloat(f.material)||0,h=parseFloat(f.horas)||0,km=parseFloat(f.km)||0;
  const vis=f.visita?TAXA_VISITA:0;
  const ct=mat+h*H_RATE+km*KM_RATE+vis;
  const imp=val*IMPOSTO/100;
  const luc=val-ct,liq=luc-imp;
  const showPrev=val||mat||h||km;
  const add=()=>{
    if(!f.data||!f.cliente||!val){setToast({msg:'Preencha data, cliente e valor!',type:'err'});return;}
    onAdd({...f,valor:val,material:mat,horas:h,km,visita:f.visita?1:0});
    setF({data:today(),cliente:'',segmento:'Residencial',tipo:TIPOS[0],status:'Recebido',valor:'',material:'',horas:'',km:'',visita:false});
    setToast({msg:'Serviço registrado!',type:'ok'});
  };
  return(
    <div className="max-w-xl mx-auto fade-in space-y-4">
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      <div className="text-center pb-2">
        <h2 className="text-xl font-bold text-white">Novo Serviço</h2>
        <p className="text-xs mt-1" style={{color:'#666'}}>Preencha e registre em menos de 30 segundos</p>
      </div>
      <div className="rounded-xl p-4 space-y-3" style={{background:'#161616',border:'1px solid #2a2a2a'}}>
        <Sec>Dados do Serviço</Sec>
        <div className="grid grid-cols-2 gap-3">
          <div><label>Data</label><input type="date" value={f.data} onChange={e=>s('data',e.target.value)}/></div>
          <div><label>Segmento</label><select value={f.segmento} onChange={e=>s('segmento',e.target.value)}><option>Residencial</option><option>Industrial</option></select></div>
        </div>
        <div><label>Cliente</label>
          <select value={f.cliente} onChange={e=>s('cliente',e.target.value)}>
            <option value="">— Selecione —</option>
            {clientes.map(c=><option key={c.id}>{c.nome}</option>)}

function Fiscal({svcs,desp}){
  const byM={};
  svcs.forEach(s=>{
    const d=new Date(s.data+'T12:00:00');
    const k=`${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
    if(!byM[k])byM[k]={fat:0,custo:0,luc:0,lucLiq:0,imp:0,qtd:0,mesN:d.getMonth(),ano:d.getFullYear()};
    byM[k].fat+=s.valor;byM[k].custo+=custoSvc(s);byM[k].luc+=lucroSvc(s);byM[k].lucLiq+=lucroLiqSvc(s);byM[k].imp+=impostoSvc(s);byM[k].qtd++;
  });
  desp.forEach(d=>{
    const dt=new Date(d.data+'T12:00:00');
    const k=`${dt.getFullYear()}-${String(dt.getMonth()).padStart(2,'0')}`;
    if(byM[k])byM[k].lucLiq-=d.valor;
  });
  const months=[...Object.entries(byM).sort(([a],[b])=>a.localeCompare(b)).map(([,v])=>v)].reverse();
  const totF=months.reduce((a,m)=>a+m.fat,0);
  const totI=months.reduce((a,m)=>a+m.imp,0);
  const totD=desp.reduce((a,d)=>a+d.valor,0);
  const totLiq=months.reduce((a,m)=>a+m.lucLiq,0);
  const cur=months[0];

          <div className="grid gap-4" style={{gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))"}}>
            {[['Faturamento',brl(cur.fat),'#FFD600'],['Custo Operac.',brl(cur.custo),'#f97316'],['Imposto 3%',brl(cur.imp),'#f97316'],['Lucro Líquido',brl(cur.lucLiq),'#22c55e']].map(([l,v,c])=>(
              <div key={l} className="text-center">
                <div className="text-xs mb-1" style={{color:'#555'}}>{l}</div>
                <div className="mono font-bold text-base" style={{color:c}}>{v}</div>
              </div>
            ))}
          </div>
          <div className="mt-3 pt-3 text-xs" style={{borderTop:'1px solid #2a2a2a',color:'#666'}}>
            Média de imposto por serviço: <strong style={{color:'#f97316'}}>{brl(cur.qtd?cur.imp/cur.qtd:0)}</strong> · Serviços: <strong style={{color:'#FFD600'}}>{cur.qtd}</strong>

      <div className="rounded-xl overflow-hidden" style={{background:'#161616',border:'1px solid #2a2a2a'}}>
        <div className="overflow-x-auto">
          <table className="w-full">
            <thead><tr>{['Mês','Svc','Faturamento','Custo Oper.','Imposto 3%','Despesas','Lucro Bruto','Lucro Líquido','Marg. Liq.'].map(h=><th key={h} className="px-3 py-2 text-left text-xs font-bold uppercase tracking-wider whitespace-nowrap" style={{color:'#555',background:'#1a1a1a',borderBottom:'1px solid #222'}}>{h}</th>)}</tr></thead>
            <tbody>
              {months.map(m=>{
                const despM=desp.filter(d=>{const dt=new Date(d.data+'T12:00:00');return dt.getMonth()===m.mesN&&dt.getFullYear()===m.ano;}).reduce((a,d)=>a+d.valor,0);
                const mliq=m.fat>0?m.lucLiq/m.fat*100:0;
                return(
                  <tr key={m.mesN+'-'+m.ano} style={{borderBottom:'1px solid #111'}} className="hover:bg-gray-900">
                    <td className="px-3 py-2 font-semibold text-sm whitespace-nowrap">{MESES_L[m.mesN].slice(0,3)} {m.ano}</td>

function Ranking({svcs}){
  const byT={};svcs.forEach(s=>{if(!byT[s.tipo])byT[s.tipo]={tipo:s.tipo,qtd:0,fat:0,liq:0};byT[s.tipo].qtd++;byT[s.tipo].fat+=s.valor;byT[s.tipo].liq+=lucroLiqSvc(s);});
  const byC={};svcs.forEach(s=>{if(!byC[s.cliente])byC[s.cliente]={nome:s.cliente,qtd:0,fat:0,liq:0};byC[s.cliente].qtd++;byC[s.cliente].fat+=s.valor;byC[s.cliente].liq+=lucroLiqSvc(s);});
  const topL=[...Object.values(byT)].sort((a,b)=>b.liq-a.liq).slice(0,7);
  const topQ=[...Object.values(byT)].sort((a,b)=>b.qtd-a.qtd).slice(0,7);
  const topC=[...Object.values(byC)].sort((a,b)=>b.fat-a.fat);
  const mxL=topL[0]?.liq||1,mxQ=topQ[0]?.qtd||1,mxC=topC[0]?.fat||1;
  const mdl=['🥇','🥈','🥉'];
  return(
    <div className="fade-in space-y-4">
      <div className="grid grid-cols-2 gap-4">
        <div className="rounded-xl p-4" style={{background:'#161616',border:'1px solid #2a2a2a'}}>
          <Sec>Mais Lucrativos (Lucro Liq.)</Sec>
          {topL.map((t,i)=>(
            <div key={t.tipo} className="mb-3">
              <div className="flex justify-between items-center mb-1">

                <span className="mono text-xs font-bold" style={{color:'#22c55e',marginLeft:8}}>{brl(t.liq)}</span>

          <Sec>Mais Realizados</Sec>
          {topQ.map((t,i)=>(
            <div key={t.tipo} className="mb-3">
              <div className="flex justify-between items-center mb-1">
                <span className="text-xs" style={{color:i===0?'#FFD600':'#888'}}>{i<3?mdl[i]:`${i+1}.`} {t.tipo}</span>
                <span className="mono text-xs font-bold" style={{color:'#60a5fa'}}>{t.qtd}×</span>
              </div>
              <StatBar val={t.qtd} max={mxQ} color="#60a5fa"/>
            </div>

        </div>
      </div>

        {topC.map((c,i)=>(
          <div key={c.nome} className="flex items-center gap-3 mb-3">

            <Avatar nome={c.nome} size={30}/>
            <div style={{flex:1,minWidth:0}}>
              <div className="flex justify-between mb-1">

        ))}
      </div>
    </div>
  );
}

          <div className="mono font-bold text-lg" style={{color:'#22c55e'}}>{brl(luc)}</div>

      <div className="rounded-xl p-4" style={{background:'#161616',border:'1px solid #2a2a2a'}}>

let _matId=200;

function Almoxarifado({materiais,setMateriais}){
  const [catFil,setCatFil]=useState('Todas');
  const [q,setQ]=useState('');
  const [form,setForm]=useState({categoria:CATS_MAT[0],nome:'',unidade:'un',precoUnit:''});
  const [toast,setToast]=useState(null);
  const [showAdd,setShowAdd]=useState(false);

  const sf=(k,v)=>setForm(p=>({...p,[k]:v}));

  const addMat=()=>{
    if(!form.nome||!form.precoUnit){setToast({msg:'Informe nome e preço!',type:'err'});return;}
    setMateriais(p=>[...p,{...form,id:++_matId,precoUnit:parseFloat(form.precoUnit)||0}]);
    setForm({categoria:CATS_MAT[0],nome:'',unidade:'un',precoUnit:''});
    setShowAdd(false);setToast({msg:'Material adicionado!',type:'ok'});
  };

  const delMat=id=>{
    if(!window.confirm('Remover este material?'))return;
    setMateriais(p=>p.filter(m=>m.id!==id));setToast({msg:'Material removido.',type:'ok'});
  };

  const fil=materiais.filter(m=>(catFil==='Todas'||m.categoria===catFil)&&(m.nome.toLowerCase().includes(q.toLowerCase())||m.categoria.toLowerCase().includes(q.toLowerCase())));
  const cats=CATS_MAT.filter(c=>materiais.some(m=>m.categoria===c));

  return(
    <div className="fade-in space-y-4">
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-lg font-bold text-white">🏪 Almoxarifado Digital</h2>
          <p className="text-xs mt-0.5" style={{color:'#666'}}>{materiais.length} itens cadastrados — banco global de materiais</p>
        </div>
        <button onClick={()=>setShowAdd(a=>!a)} className="py-2 px-4 rounded-xl font-bold text-sm text-black" style={{background:'#FFD600',border:'none'}}>+ Novo Material</button>
      </div>

      {showAdd&&(
        <div className="rounded-xl p-4 space-y-3 fade-in" style={{background:'#161616',border:'1px solid #FFD600'}}>
          <Sec>Cadastrar Novo Material</Sec>
          <div className="grid grid-cols-2 gap-3">
            <div style={{gridColumn:'1/-1'}}>
              <label>Categoria</label>
              <select value={form.categoria} onChange={e=>sf('categoria',e.target.value)}>
                {CATS_MAT.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div style={{gridColumn:'1/-1'}}><label>Nome do Material</label><input placeholder="Ex: Cabo flexível 2,5mm² azul" value={form.nome} onChange={e=>sf('nome',e.target.value)}/></div>
            <div>
              <label>Unidade</label>
              <select value={form.unidade} onChange={e=>sf('unidade',e.target.value)}>
                {['un','m','rl','pct','par','cx','kg','L'].map(u=><option key={u}>{u}</option>)}
              </select>
            </div>
            <div><label>Preço Unitário (R$)</label><input type="number" step="0.01" min="0" placeholder="0,00" value={form.precoUnit} onChange={e=>sf('precoUnit',e.target.value)}/></div>
          </div>
          <div className="flex gap-3">
            <button onClick={addMat} className="py-2 px-5 rounded-lg font-bold text-black text-sm" style={{background:'#FFD600',border:'none'}}>💾 Salvar</button>
            <button onClick={()=>setShowAdd(false)} className="py-2 px-5 rounded-lg text-sm" style={{background:'transparent',border:'1px solid #333',color:'#888'}}>Cancelar</button>
          </div>
        </div>
      )}

      <div className="flex gap-2 flex-wrap">
        <input placeholder="Buscar material..." value={q} onChange={e=>setQ(e.target.value)} style={{flex:'1 1 200px'}}/>
        <select value={catFil} onChange={e=>setCatFil(e.target.value)} style={{width:'auto'}}>
          <option value="Todas">Todas as categorias</option>
          {cats.map(c=><option key={c}>{c}</option>)}
        </select>
      </div>

      <div className="grid gap-3" style={{gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))"}}>
        <KPI label="Total de Itens" value={materiais.length} color="#FFD600"/>
        <KPI label="Categorias" value={cats.length} color="#60a5fa"/>
        <KPI label="Filtrados" value={fil.length} color="#aaa"/>
        <KPI label="Valor Médio" value={brl(materiais.length?materiais.reduce((a,m)=>a+m.precoUnit,0)/materiais.length:0)} color="#22c55e"/>
      </div>

      {CATS_MAT.filter(c=>catFil==='Todas'?true:c===catFil).map(cat=>{
        const itens=fil.filter(m=>m.categoria===cat);
        if(!itens.length)return null;
        return(
          <div key={cat} className="rounded-xl overflow-hidden" style={{background:'#161616',border:'1px solid #2a2a2a'}}>
            <div className="px-4 py-2 flex items-center justify-between" style={{background:'#1a1a1a',borderBottom:'1px solid #222'}}>
              <span className="text-xs font-bold uppercase tracking-widest" style={{color:'#FFD600'}}>{cat}</span>
              <span className="text-xs" style={{color:'#444'}}>{itens.length} itens</span>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead><tr>{['Material','Unid.','Preço Unit.',''].map(h=><th key={h} className="px-3 py-2 text-left text-xs font-bold uppercase tracking-wider" style={{color:'#555',borderBottom:'1px solid #222'}}>{h}</th>)}</tr></thead>
                <tbody>
                  {itens.map(m=>(
                    <tr key={m.id} style={{borderBottom:'1px solid #111'}} className="hover:bg-gray-900">
                      <td className="px-3 py-2 text-sm font-medium">{m.nome}</td>
                      <td className="px-3 py-2 text-xs" style={{color:'#666'}}>{m.unidade}</td>
                      <td className="px-3 py-2 mono font-bold text-sm" style={{color:'#22c55e'}}>{brl(m.precoUnit)}</td>
                      <td className="px-3 py-2"><button onClick={()=>delMat(m.id)} style={{background:'none',border:'none',color:'#444',fontSize:18,cursor:'pointer',lineHeight:1}} title="Remover">×</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}
      {!fil.length&&<div className="text-center py-10 text-sm" style={{color:'#444'}}>Nenhum material encontrado</div>}
    </div>
  );
}

function Orcamento({clientes,materiais,empCfg}){
  const TV=parseFloat((empCfg||{}).taxaVisita)||80;

  // Dados empresa SEMPRE do empCfg (nunca estado local desatualizado)
  const eNome=(empCfg&&empCfg.nome)||'';
  const eCnpj=(empCfg&&empCfg.cnpj)||'';
  const eCrea=(empCfg&&empCfg.crea)||'';
  const eTel=(empCfg&&empCfg.whatsapp)||(empCfg&&empCfg.tel)||'';
  const eIg=(empCfg&&empCfg.instagram)||'';
  const ePix=(empCfg&&empCfg.pix)||'';
  const eCidade=(empCfg&&empCfg.cidade)||'Luziania';
  const eEstado=(empCfg&&empCfg.estado)||'GO';
  const eObs=(empCfg&&empCfg.obs)||'';
  const eLogo=(empCfg&&empCfg.logo)||'';
  const semDados=!eNome;

  const [cli,setCli]=useState({nome:'',tel:'',end:''});
  const [itens,setItens]=useState([{desc:'',qtd:1,valor:0}]);
  const [form,setForm]=useState({visita:'0',desconto:'0',validade:'15 dias',pagamento:'A vista no PIX',prazo:'5 dias uteis',data:today()});
  const [orcaTxt,setOrcaTxt]=useState('');
  const [toast,setToast]=useState(null);
  const [matOrc,setMatOrc]=useState([]);
  const [catMatSel,setCatMatSel]=useState(CATS_MAT[0]);
  const [matSel,setMatSel]=useState('');
  const [qtdMatSel,setQtdMatSel]=useState(1);
  const [abaMat,setAbaMat]=useState(false);

  const sc=(k,v)=>setCli(p=>({...p,[k]:v}));
  const sg=(k,v)=>setForm(p=>({...p,[k]:v}));
  const addItem=()=>setItens(p=>[...p,{desc:'',qtd:1,valor:0}]);
  const rmItem=i=>setItens(p=>p.filter((_,idx)=>idx!==i));
  const setItem=(i,k,v)=>setItens(p=>p.map((it,idx)=>idx===i?{...it,[k]:v}:it));
  const sub=itens.reduce((a,it)=>a+it.qtd*(parseFloat(it.valor)||0),0);
  const vis=parseFloat(form.visita)||0;
  const desc=parseFloat(form.desconto)||0;
  const tot=sub+vis-desc;
  const matsCat=(materiais||[]).filter(m=>m.categoria===catMatSel);
  const totalMat=matOrc.reduce((a,m)=>a+m.qtd*m.precoUnit,0);

  const adicionarMat=()=>{
    if(!matSel){setToast({msg:'Selecione um material!',type:'err'});return;}
    const m=(materiais||[]).find(x=>x.id===parseInt(matSel));
    if(!m)return;
    setMatOrc(p=>{
      const ex=p.find(x=>x.matId===m.id);
      if(ex)return p.map(x=>x.matId===m.id?{...x,qtd:x.qtd+(parseFloat(qtdMatSel)||1)}:x);
      return [...p,{matId:m.id,nome:m.nome,unidade:m.unidade,qtd:parseFloat(qtdMatSel)||1,precoUnit:m.precoUnit}];
    });
    setMatSel('');setQtdMatSel(1);setToast({msg:'Material adicionado!',type:'ok'});
  };
  const rmMat=id=>setMatOrc(p=>p.filter(m=>m.matId!==id));

  const gerar=()=>{
    if(!cli.nome||tot<=0){setToast({msg:'Selecione cliente e adicione itens!',type:'err'});return;}
    const numOrc='ORC-'+String(Date.now()).slice(-6);
    const itensStr=itens.filter(it=>it.valor>0).map(it=>`  - ${it.desc}${it.qtd>1?' ('+it.qtd+'x)':''}: ${brl(it.qtd*(it.valor||0))}`).join('\n');
    const matStr=matOrc.length>0?'\n\n--- LISTA DE MATERIAIS ---\n'+matOrc.map(m=>`  [ ] ${m.nome} | ${m.qtd} ${m.unidade} x ${brl(m.precoUnit)} = ${brl(m.qtd*m.precoUnit)}`).join('\n')+`\n  Total materiais: ${brl(totalMat)}`:'';
    const txt=`ORCAMENTO DE SERVICO ELETRICO\n`
      +`No ${numOrc} | Data: ${fmtDate(form.data)}\n\n`
      +`EMPRESA: ${eNome||'--'}\n`
      +(eCnpj?`CNPJ: ${eCnpj}\n`:'')
      +(eCrea?`Registro: ${eCrea}\n`:'')
      +(eTel?`WhatsApp: ${eTel}\n`:'')
      +(eIg?`Instagram: ${eIg}\n`:'')
      +`\nCLIENTE: ${cli.nome}\n`
      +`Local: ${cli.end||(eCidade+'-'+eEstado)}\n`
      +(cli.tel?`Tel: ${cli.tel}\n`:'')
      +`\n--- SERVICOS ---\n${itensStr}`
      +(vis>0?`\n\nTaxa de visita: ${brl(vis)}`:'')
      +(desc>0?`\nDesconto: -${brl(desc)}`:'')
      +`\n\nVALOR MAO DE OBRA: ${brl(tot)}`
      +matStr
      +`\n\nPagamento: ${form.pagamento}`
      +(ePix?`\nPIX: ${ePix}`:'')
      +`\nPrazo: ${form.prazo} | Validade: ${form.validade}`
      +`\n\n${eObs||'Garantia de 1 ano | Material com nota fiscal | Profissional certificado'}`;
    setOrcaTxt(txt);setToast({msg:'Orcamento gerado!',type:'ok'});
  };

  const copiar=()=>{
    if(!orcaTxt){setToast({msg:'Gere o orcamento primeiro!',type:'err'});return;}
    navigator.clipboard.writeText(orcaTxt).then(()=>setToast({msg:'Copiado!',type:'ok'})).catch(()=>{
      const ta=document.createElement('textarea');ta.value=orcaTxt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);setToast({msg:'Copiado!',type:'ok'});
    });
  };
  const wpp=()=>{
    if(!orcaTxt){setToast({msg:'Gere o orcamento primeiro!',type:'err'});return;}
    const tel=(cli.tel||'').replace(/\D/g,'');
    window.open(tel?'https://wa.me/55'+tel+'?text='+encodeURIComponent(orcaTxt):'https://wa.me/?text='+encodeURIComponent(orcaTxt),'_blank');
  };
  const copiarListaMat=()=>{
    if(!matOrc.length){setToast({msg:'Adicione materiais primeiro!',type:'err'});return;}
    const txt='LISTA DE COMPRAS - '+(cli.nome||'Cliente')+'\nData: '+fmtDate(form.data)+'\n\n'
      +matOrc.map(m=>'[ ] '+m.nome+'\n    Qtd: '+m.qtd+' '+m.unidade+' | R$ '+m.precoUnit.toFixed(2)+'/un | Total: '+brl(m.qtd*m.precoUnit)).join('\n\n')
      +'\n\nTOTAL ESTIMADO: '+brl(totalMat)+'\n'+(eNome||'')+(eTel?' - '+eTel:'');
    navigator.clipboard.writeText(txt).then(()=>setToast({msg:'Lista copiada!',type:'ok'})).catch(()=>{
      const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);setToast({msg:'Lista copiada!',type:'ok'});
    });
  };

  return(
    <div className="max-w-2xl mx-auto fade-in space-y-4">
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      <div className="text-center pb-2">
        <h2 className="text-xl font-bold text-white">Gerar Orcamento Profissional</h2>
        <p className="text-xs mt-1" style={{color:'#666'}}>PDF com dados completos da sua empresa</p>
      </div>

      {/* ── CARD EMPRESA ── */}
      <div className="rounded-xl p-4" style={{background:'#0d0900',border:`1px solid ${semDados?'rgba(248,113,113,.4)':'rgba(255,214,0,.25)'}`}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
          {eLogo&&(
            <img src={eLogo} alt="Logo" style={{width:56,height:56,objectFit:'contain',borderRadius:8,background:'#1a1a1a',padding:4,flexShrink:0}}/>
          )}
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:10,fontWeight:700,color:'#FFD600',letterSpacing:1,textTransform:'uppercase'}}>Empresa no Orcamento</span>
              <span style={{fontSize:10,color:'#555'}}>(edite em Configuracoes)</span>
            </div>
            {semDados?(
              <div style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.3)',borderRadius:8,padding:'8px 12px',fontSize:11,color:'#f87171'}}>
                Preencha os dados da empresa em Configuracoes antes de gerar o PDF.
              </div>
            ):(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px 16px',fontSize:12}}>
                <div><span style={{color:'#555'}}>Empresa: </span><span style={{color:'#ddd',fontWeight:600}}>{eNome}</span></div>
                {eCnpj&&<div><span style={{color:'#555'}}>CNPJ: </span><span style={{color:'#ddd'}}>{eCnpj}</span></div>}
                {eCrea&&<div><span style={{color:'#555'}}>Registro: </span><span style={{color:'#ddd'}}>{eCrea}</span></div>}
                {eTel&&<div><span style={{color:'#555'}}>WhatsApp: </span><span style={{color:'#ddd'}}>{eTel}</span></div>}
                {eIg&&<div><span style={{color:'#555'}}>Instagram: </span><span style={{color:'#ddd'}}>{eIg}</span></div>}
                {ePix&&<div><span style={{color:'#555'}}>PIX: </span><span style={{color:'#ddd'}}>{ePix}</span></div>}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ── CLIENTE ── */}
      <div className="rounded-xl p-4 space-y-3" style={{background:'#161616',border:'1px solid #2a2a2a'}}>
        <Sec>Dados do Cliente</Sec>
        <div className="grid gap-3" style={{gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))'}}>
          <div>
            <label>Selecionar Cliente Cadastrado</label>
            <select value={cli.nome} onChange={e=>{const c=clientes.find(x=>x.nome===e.target.value);setCli({nome:e.target.value,tel:c?c.tel:'',end:c?c.cidade:''});}}>
              <option value="">— Selecione ou digite abaixo —</option>
              {clientes.map(c=><option key={c.id}>{c.nome}</option>)}
            </select>
          </div>
          <div><label>Nome (digitar)</label><input placeholder="Nome do cliente" value={cli.nome} onChange={e=>sc('nome',e.target.value)}/></div>
          <div><label>WhatsApp do Cliente</label><input placeholder="(61) 99999-0000" value={cli.tel} onChange={e=>sc('tel',e.target.value)}/></div>
          <div><label>Data do Orcamento</label><input type="date" value={form.data} onChange={e=>sg('data',e.target.value)}/></div>
        </div>
        <div><label>Endereco / Local do Servico</label><input placeholder={'Rua, No - '+eCidade+'-'+eEstado} value={cli.end} onChange={e=>sc('end',e.target.value)}/></div>
      </div>

      {/* ── ITENS ── */}
      <div className="rounded-xl p-4 space-y-3" style={{background:'#161616',border:'1px solid #2a2a2a'}}>
        <div className="flex justify-between items-center">
          <Sec>Servicos / Mao de Obra</Sec>
          <button onClick={addItem} style={{background:'transparent',border:'1px solid #333',color:'#aaa',borderRadius:8,padding:'4px 12px',fontSize:12,cursor:'pointer',fontWeight:600}}>+ Item</button>
        </div>
        {itens.map((it,i)=>(
          <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 60px 110px 28px',gap:8,alignItems:'center'}}>
            <input placeholder="Descricao do servico..." value={it.desc} onChange={e=>setItem(i,'desc',e.target.value)}/>
            <input type="number" min="1" value={it.qtd} onChange={e=>setItem(i,'qtd',parseInt(e.target.value)||1)} placeholder="Qtd"/>
            <input type="number" min="0" step="0.01" value={it.valor||''} onChange={e=>setItem(i,'valor',parseFloat(e.target.value)||0)} placeholder="R$ Valor"/>
            <button onClick={()=>rmItem(i)} style={{background:'none',border:'none',color:'#555',fontSize:22,cursor:'pointer',lineHeight:1,padding:0}}>&times;</button>
          </div>
        ))}
        <div style={{textAlign:'right',fontSize:12,fontWeight:700,color:'#FFD600'}}>Subtotal mao de obra: {brl(sub)}</div>
      </div>

      {/* ── MATERIAIS ── */}
      <div className="rounded-xl overflow-hidden" style={{background:'#161616',border:'1px solid #2a2a2a'}}>
        <button onClick={()=>setAbaMat(a=>!a)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',background:'none',border:'none',cursor:'pointer'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:14,fontWeight:700,color:'#FFD600'}}>Lista de Materiais</span>
            {matOrc.length>0&&<span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:4,background:'#2a1e00',color:'#FFD600'}}>{matOrc.length} itens — {brl(totalMat)}</span>}
          </div>
          <span style={{color:'#555',fontSize:18}}>{abaMat?'▲':'▼'}</span>
        </button>
        {abaMat&&(
          <div className="px-4 pb-4 space-y-3 fade-in">
            <p style={{fontSize:12,color:'#666'}}>Selecione materiais do Almoxarifado para gerar lista de compras separada.</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 80px auto',gap:8}}>
              <select value={catMatSel} onChange={e=>{setCatMatSel(e.target.value);setMatSel('');}}>
                {CATS_MAT.map(c=><option key={c}>{c}</option>)}
              </select>
              <select value={matSel} onChange={e=>setMatSel(e.target.value)}>
                <option value="">— Material —</option>
                {matsCat.map(m=><option key={m.id} value={m.id}>{m.nome} ({brl(m.precoUnit)}/{m.unidade})</option>)}
              </select>
              <input type="number" min="0.1" step="0.5" value={qtdMatSel} onChange={e=>setQtdMatSel(parseFloat(e.target.value)||1)} placeholder="Qtd"/>
              <button onClick={adicionarMat} style={{background:'#FFD600',border:'none',borderRadius:8,padding:'0 12px',fontWeight:700,color:'#111',fontSize:13,cursor:'pointer',whiteSpace:'nowrap'}}>+ Add</button>
            </div>
            {matOrc.length>0&&(
              <div style={{borderRadius:10,overflow:'hidden',border:'1px solid #333'}}>
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead>
                    <tr>{['Material','Qtd','Unit.','Total',''].map(h=><th key={h} style={{padding:'6px 10px',textAlign:'left',fontSize:10,fontWeight:700,textTransform:'uppercase',color:'#555',background:'#1a1a1a',borderBottom:'1px solid #222'}}>{h}</th>)}</tr>
                  </thead>
                  <tbody>
                    {matOrc.map(m=>(
                      <tr key={m.matId} style={{borderBottom:'1px solid #111'}}>
                        <td style={{padding:'6px 10px',fontSize:12,fontWeight:500}}>{m.nome}</td>
                        <td style={{padding:'6px 10px',fontSize:11,color:'#aaa'}}>{m.qtd} {m.unidade}</td>
                        <td style={{padding:'6px 10px',fontSize:11,fontFamily:'monospace',color:'#666'}}>{brl(m.precoUnit)}</td>
                        <td style={{padding:'6px 10px',fontSize:11,fontFamily:'monospace',fontWeight:700,color:'#22c55e'}}>{brl(m.qtd*m.precoUnit)}</td>
                        <td style={{padding:'6px 10px'}}><button onClick={()=>rmMat(m.matId)} style={{background:'none',border:'none',color:'#444',fontSize:18,cursor:'pointer',lineHeight:1}}>&times;</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'#1a1a1a',borderTop:'1px solid #333'}}>
                  <span style={{fontSize:12,fontWeight:700,color:'#FFD600'}}>Total estimado: {brl(totalMat)}</span>
                  <button onClick={copiarListaMat} style={{background:'#0d1a2a',border:'1px solid #1e3a5a',color:'#60a5fa',borderRadius:8,padding:'6px 14px',fontSize:11,fontWeight:700,cursor:'pointer'}}>Copiar Lista</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* ── TAXAS ── */}
      <div className="rounded-xl p-4 space-y-3" style={{background:'#161616',border:'1px solid #2a2a2a'}}>
        <Sec>Taxas e Condicoes</Sec>
        <div className="grid gap-3" style={{gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))'}}>
          <div>
            <label>Taxa de Visita</label>
            <select value={form.visita} onChange={e=>sg('visita',e.target.value)}>
              <option value="0">Sem taxa</option>
              <option value={TV}>R$ {TV},00</option>
              <option value="120">R$ 120,00 - Regiao distante</option>
            </select>
          </div>
          <div><label>Desconto (R$)</label><input type="number" min="0" value={form.desconto} onChange={e=>sg('desconto',e.target.value)}/></div>
          <div><label>Validade</label><select value={form.validade} onChange={e=>sg('validade',e.target.value)}><option>7 dias</option><option>15 dias</option><option>30 dias</option></select></div>
          <div><label>Pagamento</label><select value={form.pagamento} onChange={e=>sg('pagamento',e.target.value)}><option>A vista no PIX</option><option>50% entrada + 50% conclusao</option><option>Cartao de credito</option><option>A combinar</option></select></div>
          <div><label>Prazo Execucao</label><select value={form.prazo} onChange={e=>sg('prazo',e.target.value)}><option>No mesmo dia</option><option>1 dia util</option><option>3 dias uteis</option><option>5 dias uteis</option><option>1 semana</option></select></div>
          <div style={{display:'flex',alignItems:'flex-end'}}>
            <div style={{background:'#0a0800',border:'1px solid #FFD600',borderRadius:12,padding:'10px 14px',width:'100%',textAlign:'center'}}>
              <div style={{fontSize:10,color:'#888',marginBottom:2}}>MAO DE OBRA</div>
              <div style={{fontFamily:'monospace',fontWeight:700,fontSize:20,color:'#FFD600'}}>{brl(tot)}</div>
              {matOrc.length>0&&<div style={{fontSize:10,color:'#22c55e',marginTop:2}}>+{brl(totalMat)} mat.</div>}
            </div>
          </div>
        </div>
      </div>

      <button onClick={gerar} style={{width:'100%',padding:'14px',background:'#FFD600',border:'none',borderRadius:12,fontWeight:800,fontSize:16,color:'#111',cursor:'pointer'}}>
        Gerar Orcamento
      </button>

      {orcaTxt&&(
        <div className="space-y-3">
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:2,color:'#FFD600'}}>Orcamento Gerado</div>
          <div style={{background:'#0f0f0f',border:'1px solid #333',borderRadius:12,padding:16,fontSize:11,lineHeight:1.6,color:'#aaa',fontFamily:'monospace',whiteSpace:'pre-wrap',maxHeight:260,overflowY:'auto'}}>{orcaTxt}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <button onClick={copiar} style={{padding:'12px',background:'#0d1a2a',border:'1px solid #1e3a5a',color:'#60a5fa',borderRadius:10,fontWeight:700,fontSize:13,cursor:'pointer'}}>Copiar WhatsApp</button>
            <button onClick={wpp} style={{padding:'12px',background:'#075e54',color:'#fff',border:'none',borderRadius:10,fontWeight:700,fontSize:13,cursor:'pointer'}}>Abrir WhatsApp</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <button onClick={()=>gerarPDFOrcamento(empCfg,cli,itens,form,matOrc,tot,totalMat)} style={{padding:'12px',background:'#1a0a0a',border:'1px solid #7f1d1d',color:'#f87171',borderRadius:10,fontWeight:700,fontSize:13,cursor:'pointer'}}>PDF Orcamento</button>
            <button onClick={()=>matOrc.length>0?gerarPDFMateriais(empCfg,cli,matOrc,totalMat,form.data):setToast({msg:'Adicione materiais primeiro!',type:'err'})} style={{padding:'12px',background:'#0a1a0a',border:'1px solid #14532d',color:'#4ade80',borderRadius:10,fontWeight:700,fontSize:13,cursor:'pointer'}}>PDF Lista Materiais</button>
          </div>
          <div style={{background:'#0a1400',border:'1px solid rgba(34,197,94,.25)',borderRadius:10,padding:'12px 16px'}}>
            <div style={{fontSize:11,fontWeight:700,color:'#22c55e',marginBottom:4}}>Dica de Fechamento</div>
            <div style={{fontSize:12,color:'#666',lineHeight:1.5}}>
              Envie e aguarde 24h. Sem resposta: <em style={{color:'#22c55e'}}>"{cli.nome||'[cliente]'}, tenho agenda disponivel essa semana. Posso confirmar?"</em>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ── PDF HELPERS ─────────────────────────────────────────────
function rRect(doc,x,y,w,h,r,style){
  try{doc.roundedRect(x,y,w,h,r,r,style);}catch(e){doc.rect(x,y,w,h,style);}
}

function gerarPDFOrcamento(empCfg,cli,itens,form,matOrc,tot,totalMat){
  if(!window.jspdf){alert('PDF nao disponivel. Verifique conexao com internet.');return;}
  var doc=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var W=doc.internal.pageSize.getWidth();
  var PH=doc.internal.pageSize.getHeight();
  var M=13; // margin
  var y=0;

  // dados empresa
  var eNome=(empCfg&&empCfg.nome)||'';
  var eRazao=(empCfg&&empCfg.razao)||'';
  var eCnpj=(empCfg&&empCfg.cnpj)||'';
  var eCrea=(empCfg&&empCfg.crea)||'';
  var eTel=(empCfg&&empCfg.whatsapp)||(empCfg&&empCfg.tel)||'';
  var eEmail=(empCfg&&empCfg.email)||'';
  var eIg=(empCfg&&empCfg.instagram)||'';
  var eSite=(empCfg&&empCfg.site)||'';
  var eCidade=(empCfg&&empCfg.cidade)||'Luziania';
  var eEstado=(empCfg&&empCfg.estado)||'GO';
  var eEnd=(empCfg&&empCfg.endereco)||'';
  var ePix=(empCfg&&empCfg.pix)||'';
  var eObs=(empCfg&&empCfg.obs)||'Garantia de 1 ano nos servicos | Material com nota fiscal | Profissional certificado | Atendimento '+eCidade+'-'+eEstado;
  var eLogo=(empCfg&&empCfg.logo)||'';
  var displayNome=eNome||'Eletrica Profissional';

  // ── CABECALHO ─────────────────────────────────────────────
  doc.setFillColor(8,8,8);
  doc.rect(0,0,W,34,'F');
  doc.setFillColor(255,214,0);
  doc.rect(0,0,6,34,'F');

  // Logo (se existir)
  if(eLogo){
    try{
      var fmt=eLogo.indexOf('image/png')>-1?'PNG':'JPEG';
      doc.addImage(eLogo,fmt,W-46,3,32,28);
    }catch(e){}
  }

  // Titulo
  doc.setTextColor(255,214,0);
  doc.setFontSize(17); doc.setFont('helvetica','bold');
  doc.text('ORCAMENTO DE SERVICO',M+1,13);
  doc.setFontSize(7.5); doc.setFont('helvetica','normal');
  doc.setTextColor(150,150,150);
  doc.text('SERVICO ELETRICO PROFISSIONAL',M+1,19);

  // Empresa info (lado direito)
  var rightX = eLogo ? W-50 : W-M;
  var align = {align:'right'};
  doc.setTextColor(220,220,220); doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text(displayNome, rightX, 9, align);
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(140,140,140);
  if(eRazao&&eRazao!==eNome) doc.text(eRazao, rightX, 13.5, align);
  if(eCnpj) doc.text('CNPJ: '+eCnpj, rightX, 18, align);
  if(eTel) doc.text('Tel: '+eTel, rightX, eCnpj?22.5:18, align);
  if(eCrea) doc.text(eCrea, rightX, eCnpj?27:22.5, align);

  y=40;

  // Numero e data
  var numOrc='ORC-'+String(Date.now()).slice(-6);
  doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(255,214,0);
  doc.text('No '+numOrc, M, y);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(120,120,120);
  doc.text('Data: '+fmtDate(form.data), M, y+6);
  y+=14;

  // Endereco empresa (se tiver)
  if(eEnd||eIg||eSite){
    doc.setFillColor(20,20,20);
    rRect(doc,M-2,y-3,W-2*M+4,12,2,'F');
    doc.setTextColor(100,100,100); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('EMPRESA',M,y+1);
    doc.setTextColor(170,170,170); doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
    var eInfo=[];
    if(eEnd) eInfo.push(eEnd);
    if(eCidade) eInfo.push(eCidade+'-'+eEstado);
    if(eIg) eInfo.push(eIg);
    if(eSite) eInfo.push(eSite);
    doc.text(eInfo.join(' | ').slice(0,85), M, y+7);
    y+=16;
  }

  // ── CLIENTE ───────────────────────────────────────────────
  doc.setFillColor(22,22,22);
  rRect(doc,M-2,y-3,W-2*M+4,28,2,'F');
  doc.setTextColor(100,100,100); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
  doc.text('CLIENTE',M,y+1);
  doc.setTextColor(240,240,240); doc.setFontSize(12); doc.setFont('helvetica','bold');
  doc.text((cli&&cli.nome)||'--',M,y+9);
  doc.setTextColor(130,130,130); doc.setFontSize(8); doc.setFont('helvetica','normal');
  var cliLoc=(cli&&cli.end)||(eCidade+'-'+eEstado);
  doc.text('Local: '+cliLoc, M, y+17);
  if(cli&&cli.tel) doc.text('Tel: '+cli.tel, W/2, y+17);
  y+=34;

  // ── SERVICOS ──────────────────────────────────────────────
  doc.setTextColor(255,214,0); doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text('SERVICOS / MAO DE OBRA',M,y);
  y+=5;
  doc.setDrawColor(50,50,50); doc.setLineWidth(0.3);
  doc.line(M-2,y,W-M+2,y);
  y+=6;

  var validItens=itens.filter(function(it){return it.valor>0;});
  validItens.forEach(function(it,i){
    if(y>245){doc.addPage();y=16;}
    doc.setFillColor(i%2===0?20:16, i%2===0?20:16, i%2===0?20:16);
    doc.rect(M-2,y-3,W-2*M+4,9,'F');
    doc.setTextColor(210,210,210); doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
    var desc=(it.qtd>1?it.qtd+'x ':'')+it.desc;
    doc.text(desc.slice(0,58),M,y+3);
    doc.setTextColor(255,214,0); doc.setFont('helvetica','bold');
    doc.text(brl(it.qtd*(it.valor||0)),W-M,y+3,{align:'right'});
    doc.setFont('helvetica','normal');
    y+=10;
  });
  y+=3;

  var vis=parseFloat(form.visita)||0;
  var desc2=parseFloat(form.desconto)||0;
  if(vis>0){
    doc.setTextColor(150,150,150); doc.setFontSize(8);
    doc.text('Taxa de visita tecnica:',M,y); doc.text(brl(vis),W-M,y,{align:'right'}); y+=7;
  }
  if(desc2>0){
    doc.setTextColor(34,197,94);
    doc.text('Desconto:',M,y); doc.text('-'+brl(desc2),W-M,y,{align:'right'}); y+=7;
  }

  // ── TOTAL MAO DE OBRA ─────────────────────────────────────
  if(y>245){doc.addPage();y=16;}
  doc.setFillColor(20,16,0);
  rRect(doc,M-2,y,W-2*M+4,17,2,'F');
  doc.setDrawColor(255,214,0); doc.setLineWidth(0.5);
  rRect(doc,M-2,y,W-2*M+4,17,2,'S');
  doc.setTextColor(140,140,140); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('VALOR MAO DE OBRA',M,y+7);
  doc.setTextColor(255,214,0); doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text(brl(tot),W-M,y+12,{align:'right'});
  y+=24;

  // ── MATERIAIS (se houver) ─────────────────────────────────
  if(matOrc&&matOrc.length>0){
    if(y>230){doc.addPage();y=16;}
    doc.setFillColor(10,22,10);
    doc.rect(M-2,y-2,W-2*M+4,9,'F');
    doc.setTextColor(34,197,94); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text('LISTA DE MATERIAIS (para comprar)',M,y+4);
    y+=13;

    matOrc.forEach(function(m,i){
      if(y>255){doc.addPage();y=16;}
      doc.setFillColor(i%2===0?18:14,i%2===0?18:14,i%2===0?18:14);
      doc.rect(M-2,y-2,W-2*M+4,9,'F');
      doc.setDrawColor(70,70,70); doc.setLineWidth(0.25);
      doc.rect(M,y+1,4,4,'S');
      doc.setTextColor(200,200,200); doc.setFont('helvetica','normal'); doc.setFontSize(8);
      doc.text(m.nome.slice(0,48),M+7,y+5);
      doc.setTextColor(130,130,130);
      doc.text(String(m.qtd)+' '+m.unidade,W-68,y+5);
      doc.text(brl(m.precoUnit),W-48,y+5);
      doc.setTextColor(34,197,94); doc.setFont('helvetica','bold');
      doc.text(brl(m.qtd*m.precoUnit),W-M,y+5,{align:'right'});
      doc.setFont('helvetica','normal');
      y+=10;
    });

    y+=3;
    if(y>252){doc.addPage();y=16;}
    doc.setFillColor(10,22,10);
    rRect(doc,M-2,y,W-2*M+4,13,2,'F');
    doc.setDrawColor(34,197,94); doc.setLineWidth(0.4);
    rRect(doc,M-2,y,W-2*M+4,13,2,'S');

function gerarPDFMateriais(empCfg,cli,matOrc,totalMat,dataStr){
  if(!window.jspdf){alert('PDF nao disponivel. Verifique conexao com internet.');return;}
  if(!matOrc||!matOrc.length){alert('Nenhum material adicionado.');return;}
  var doc=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var W=doc.internal.pageSize.getWidth();
  var PH=doc.internal.pageSize.getHeight();
  var M=13;
  var y=0;

  var eNome=(empCfg&&empCfg.nome)||'Eletrica Profissional';
  var eCnpj=(empCfg&&empCfg.cnpj)||'';
  var eTel=(empCfg&&empCfg.whatsapp)||(empCfg&&empCfg.tel)||'';
  var eCidade=(empCfg&&empCfg.cidade)||'Luziania';
  var eEstado=(empCfg&&empCfg.estado)||'GO';
  var eLogo=(empCfg&&empCfg.logo)||'';

  // Cabecalho
  doc.setFillColor(8,8,8);
  doc.rect(0,0,W,34,'F');
  doc.setFillColor(34,197,94);
  doc.rect(0,0,6,34,'F');

  if(eLogo){
    try{
      var fmt=eLogo.indexOf('image/png')>-1?'PNG':'JPEG';
      doc.addImage(eLogo,fmt,W-46,3,32,28);
    }catch(e){}
  }

  doc.setTextColor(34,197,94);
  doc.setFontSize(17); doc.setFont('helvetica','bold');
  doc.text('LISTA DE COMPRAS',M+1,13);
  doc.setFontSize(7.5); doc.setFont('helvetica','normal');
  doc.setTextColor(140,140,140);
  doc.text('MATERIAIS ELETRICOS',M+1,19);

  var rightX=eLogo?W-50:W-M;
  doc.setTextColor(210,210,210); doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text(eNome,rightX,9,{align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(130,130,130);
  if(eCnpj) doc.text('CNPJ: '+eCnpj,rightX,14,{align:'right'});
  if(eTel) doc.text('Tel: '+eTel,rightX,eCnpj?18.5:14,{align:'right'});
  doc.text('Data: '+fmtDate(dataStr),rightX,eCnpj?23:18.5,{align:'right'});
  y=40;

  // Cliente
  doc.setFillColor(22,22,22);
  rRect(doc,M-2,y-3,W-2*M+4,20,2,'F');
  doc.setTextColor(100,100,100); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
  doc.text('CLIENTE / OBRA',M,y+1);
  doc.setTextColor(240,240,240); doc.setFontSize(12); doc.setFont('helvetica','bold');
  doc.text((cli&&cli.nome)||'--',M,y+10);
  if(cli&&cli.end){doc.setTextColor(130,130,130);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(cli.end,W/2,y+10);}
  y+=26;

  // Cabecalho tabela
  doc.setFillColor(255,214,0);
  doc.rect(M-2,y,W-2*M+4,9,'F');
  doc.setTextColor(15,15,15); doc.setFontSize(8); doc.setFont('helvetica','bold');
  doc.text('MATERIAL',M+7,y+6);
  doc.text('QTD',W-70,y+6);
  doc.text('UNIT.',W-50,y+6);
  doc.text('TOTAL',W-M,y+6,{align:'right'});
  y+=12;

  matOrc.forEach(function(m,i){
    if(y>258){doc.addPage();y=16;}
    doc.setFillColor(i%2===0?20:15,i%2===0?20:15,i%2===0?20:15);
    doc.rect(M-2,y-2,W-2*M+4,10,'F');
    doc.setDrawColor(70,70,70); doc.setLineWidth(0.25);
    doc.rect(M,y+1,4,5,'S');
    doc.setTextColor(205,205,205); doc.setFont('helvetica','normal'); doc.setFontSize(8);
    doc.text(m.nome.slice(0,50),M+7,y+6);
    doc.setTextColor(140,140,140);
    doc.text(String(m.qtd)+' '+m.unidade,W-70,y+6);
    doc.text(brl(m.precoUnit),W-50,y+6);
    doc.setTextColor(34,197,94); doc.setFont('helvetica','bold');
    doc.text(brl(m.qtd*m.precoUnit),W-M,y+6,{align:'right'});
    doc.setFont('helvetica','normal');
    y+=11;
  });

  y+=4;
  if(y>255){doc.addPage();y=16;}
  doc.setFillColor(10,24,10);
  rRect(doc,M-2,y,W-2*M+4,17,2,'F');
  doc.setDrawColor(34,197,94); doc.setLineWidth(0.5);
  rRect(doc,M-2,y,W-2*M+4,17,2,'S');
  doc.setTextColor(110,110,110); doc.setFontSize(8); doc.setFont('helvetica','normal');

  doc.setTextColor(34,197,94); doc.setFontSize(14); doc.setFont('helvetica','bold');
  doc.text(brl(totalMat),W-M,y+12,{align:'right'});
  y+=24;

  if(y>255){doc.addPage();y=16;}
  doc.setFillColor(16,16,16);
  rRect(doc,M-2,y,W-2*M+4,18,2,'F');
  doc.setTextColor(80,80,80); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
  doc.text('OBSERVACAO',M,y+5);
  doc.setTextColor(120,120,120); doc.setFont('helvetica','normal');

  doc.text('Lista gerada pelo eletricista responsavel pelo servico.',M,y+16);

  // Rodape
  doc.setFillColor(8,8,8);
  doc.rect(0,PH-12,W,12,'F');
  doc.setTextColor(70,70,70); doc.setFontSize(6.5);
  doc.text(eNome+(eTel?' | '+eTel:'')+(eCnpj?' | CNPJ: '+eCnpj:''),W/2,PH-5,{align:'center'});

  doc.save('Lista_Materiais_'+((cli&&cli.nome)||'Cliente').replace(/[^a-zA-Z0-9]/g,'_')+'.pdf');
}

  };
  return(
    <div style={{minHeight:'100vh',background:'#0a0a0a',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>

<script>
// ── SERVICE WORKER (PWA offline) ─────────────────────────────
(function(){
  if(!('serviceWorker' in navigator)) return;

  // Register inline service worker via blob URL
  var swCode = `
const CACHE = 'eletrigestor-v4';
const URLS = ['/'];

self.addEventListener('install', function(e){
  self.skipWaiting();
  e.waitUntil(
    caches.open(CACHE).then(function(c){ return c.addAll(URLS).catch(function(){}); })
  );
});

self.addEventListener('activate', function(e){
  self.clients.claim();
  e.waitUntil(
    caches.keys().then(function(keys){
      return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));
    })
  );
});

self.addEventListener('fetch', function(e){
  if(e.request.method!=='GET') return;
  e.respondWith(
    fetch(e.request).then(function(res){
      var clone = res.clone();
      caches.open(CACHE).then(function(c){ c.put(e.request, clone); });
      return res;
    }).catch(function(){
      return caches.match(e.request);
    })
  );
});
`;

  var blob = new Blob([swCode], {type:'text/javascript'});
  var swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).then(function(reg){
    console.log('SW registrado:', reg.scope);
  }).catch(function(e){
    console.log('SW erro (normal em file://):', e.message);
  });
})();

// ── INSTALL BANNER (Android automático + iOS manual) ──────────
(function(){
  var deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
    showInstallBanner();
  });

  function showInstallBanner(){
    if(document.getElementById('pwa-banner')) return;
    var banner = document.createElement('div');
    banner.id = 'pwa-banner';
    banner.innerHTML = `
      <div style="
        position:fixed;bottom:0;left:0;right:0;z-index:9999;
        background:linear-gradient(135deg,#1a1200,#0a0a0a);
        border-top:2px solid #FFD600;
        padding:14px 16px 20px;
        display:flex;align-items:center;gap:14px;
        box-shadow:0 -8px 32px rgba(0,0,0,.6);
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      ">
        <div style="width:52px;height:52px;background:#FFD600;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;">⚡</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:800;font-size:15px;color:#fff;margin-bottom:3px;">Instalar EletriGestor PRO</div>
          <div style="font-size:12px;color:#999;line-height:1.4;">Adicione à tela inicial para acesso rápido, como um app de verdade.</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;">
          <button id="pwa-install-btn" style="
            background:#FFD600;color:#111;border:none;border-radius:8px;
            padding:9px 16px;font-weight:800;font-size:13px;cursor:pointer;
            white-space:nowrap;
          ">Instalar</button>
          <button id="pwa-close-btn" style="
            background:transparent;color:#555;border:1px solid #333;border-radius:8px;
            padding:7px 16px;font-size:12px;cursor:pointer;white-space:nowrap;
          ">Agora não</button>
        </div>
      </div>
    `;
    document.body.appendChild(banner);

    document.getElementById('pwa-install-btn').addEventListener('click', function(){
      if(!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(result){
        if(result.outcome === 'accepted'){
          banner.remove();
        }
        deferredPrompt = null;
      });
    });

    document.getElementById('pwa-close-btn').addEventListener('click', function(){
      banner.remove();
      localStorage.setItem('pwa_dismissed', Date.now());
    });
  }

  // iOS detection - show manual instructions
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  var isStandalone = window.navigator.standalone === true;
  var dismissed = localStorage.getItem('pwa_dismissed');
  var recentDismiss = dismissed && (Date.now() - parseInt(dismissed)) < 7*24*60*60*1000;

  if(isIOS && !isStandalone && !recentDismiss){
    setTimeout(function(){
      if(document.getElementById('pwa-banner')) return;
      var banner = document.createElement('div');
      banner.id = 'pwa-banner';
      banner.innerHTML = `
        <div style="
          position:fixed;bottom:0;left:0;right:0;z-index:9999;
          background:linear-gradient(135deg,#1a1200,#0a0a0a);
          border-top:2px solid #FFD600;
          padding:16px 16px 28px;
          box-shadow:0 -8px 32px rgba(0,0,0,.6);
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        ">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
            <div style="width:48px;height:48px;background:#FFD600;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;">⚡</div>
            <div>
              <div style="font-weight:800;font-size:15px;color:#fff;">Instalar no iPhone / iPad</div>
              <div style="font-size:12px;color:#888;margin-top:2px;">Adicione à tela inicial em 3 passos</div>
            </div>
            <button id="pwa-close-btn" style="margin-left:auto;background:none;border:none;color:#555;font-size:22px;cursor:pointer;padding:4px;">×</button>
          </div>
          <div style="display:flex;gap:10px;align-items:flex-start;">
            <div style="flex:1;background:#1a1a1a;border-radius:10px;padding:12px;text-align:center;">
              <div style="font-size:20px;margin-bottom:6px;">1️⃣</div>
              <div style="font-size:11px;color:#aaa;line-height:1.4;">Toque no botão <strong style="color:#fff;">Compartilhar</strong> (quadrado com seta ↑) na barra do Safari</div>
            </div>
            <div style="flex:1;background:#1a1a1a;border-radius:10px;padding:12px;text-align:center;">
              <div style="font-size:20px;margin-bottom:6px;">2️⃣</div>
              <div style="font-size:11px;color:#aaa;line-height:1.4;">Role para baixo e toque em <strong style="color:#fff;">Adicionar à Tela de Início</strong></div>
            </div>
            <div style="flex:1;background:#1a1a1a;border-radius:10px;padding:12px;text-align:center;">
              <div style="font-size:20px;margin-bottom:6px;">3️⃣</div>
              <div style="font-size:11px;color:#aaa;line-height:1.4;">Toque em <strong style="color:#FFD600;">Adicionar</strong> e o ícone aparece na tela!</div>
            </div>
          </div>
          <div style="margin-top:10px;text-align:center;font-size:11px;color:#444;">Use o Safari para instalar no iPhone (Chrome não suporta)</div>
        </div>
      `;
      document.body.appendChild(banner);
      document.getElementById('pwa-close-btn').addEventListener('click', function(){
        banner.remove();
        localStorage.setItem('pwa_dismissed', Date.now());
      });
    }, 3000);
  }

  // If already installed as PWA, hide install prompts
  if(isStandalone){
    console.log('Rodando como PWA instalado!');
  }
})();
</script>
